<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias por votar</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">


  <script>
    // Redirige a "cerrado.html" si ya se cerró la votación
    fetch('estado.json')
      .then(response => response.json())
      .then(data => {
        if (!data.votacion_abierta) {
          window.location.href = 'cerrado.html';
        }
      });
  </script>

</head>
<body>
  <img src="banner.jpg" alt="Banner principal" class="banner">

  <div class="mensaje">
    <p><strong>¡Gracias por participar!</strong></p>
    <p>Tu voto ya ha sido registrado.<br>Solo se permite un voto por persona.</p>
  </div>
  
  <section class="sponsors-section">

  <h2 class="titulo-sponsors">Patrocinadores Oficiales</h2>

  <div class="piramide-sponsors">

    <!-- Sponsor principal (Grande) -->
    <div class="sponsor sponsor-grande">
      <img src="sponsor.jpg" alt="Sponsor Principal">
    </div>

    <!-- Nivel medio (2) -->
    <div class="fila">
      <div class="sponsor sponsor-mediano">
        <img src="sponsor2.jpg" alt="Sponsor 2">
      </div>
      <div class="sponsor sponsor-mediano">
        <img src="sponsor3.jpg" alt="Sponsor 3">
      </div>
    </div>

    <!-- Nivel inferior (3) -->
    <div class="fila">
      <div class="sponsor sponsor-pequeno">
        <img src="sponsor4.jpg" alt="Sponsor 4">
      </div>
      <div class="sponsor sponsor-pequeno">
        <img src="sponsor5.jpg" alt="Sponsor 5">
      </div>
      <div class="sponsor sponsor-pequeno">
        <img src="sponsor6.jpg" alt="Sponsor 6">
      </div>
      </div>
    </div>
  </section>

  <img src="banner2.jpg" alt="Banner inferior" class="banner espaciado-banner2">
</body>
</html>

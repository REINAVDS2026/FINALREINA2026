<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias por votar</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">


  <script>
    // Redirige a "cerrado.html" si ya se cerró la votación
    fetch('estado.json')
      .then(response => response.json())
      .then(data => {
        if (!data.votacion_abierta) {
          window.location.href = 'cerrado.html';
        }
      });
  </script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      min-height: 100vh;
      color: white;
      overflow-x: hidden;

      background: linear-gradient(135deg,
                 #1a001f,
                 #3a0057,
                 #7a00a8,
                 #ff2da3,
                 #7a00a8,
                 #3a0057);
      background-size: 300% 300%;
      animation: fondoElegante 18s ease infinite;
    }

    @keyframes fondoElegante {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::after {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 3px 3px;
      animation: partículas 60s linear infinite;
      z-index: 0;
    }

    @keyframes partículas {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 40px
      );
      z-index: 0;
    }    

    .banner {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      position: relative;
      z-index: 2;
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,45,163,0.3), transparent 70%);
      pointer-events: none;
    }

    .mensaje {
      padding: 20px 20px 10px 20px;
      font-size: 1em;
      color: white;
    }

    .sponsors-section {
        margin-top: 60px;
        padding: 40px 20px;
        text-align: center;
    }

    .titulo-sponsors {
        margin-bottom: 10px;
        font-size: 16px;
        font-weight: bold;
    }

    .piramide-sponsors {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
    }

    .fila {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .sponsor img {
        width: 100%;
        height: auto;
        border-radius: 12px;
        transition: transform 0.3s ease;
    }

    .sponsor img:hover {
        transform: scale(1.05);
    }

    /* Tamaños */
    .sponsor-grande {
        width: 40%;
    }

    .sponsor-mediano {
        width: 28%;
    }

    .sponsor-pequeno {
        width: 18%;
    }

    .espaciado-banner2 {
      margin-top: 0px;
    }
    
    .footer {
      margin-top: 50px;
      padding: 25px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      letter-spacing: 1px;
     }
  </style>


</head>
<body>
  <img src="banner.jpg" alt="Banner principal" class="banner">

  <div class="mensaje">
    <p><strong>¡Gracias por participar!</strong></p>
    <p>Tu voto ya ha sido registrado.<br>Solo se permite un voto por persona. En unos mi unos momentos anunciaremos a la ganadora</p>
  </div>
  
  <section class="sponsors-section">

  <h2 class="titulo-sponsors">Patrocinadores Oficiales</h2>

  <div class="piramide-sponsors">

    <!-- Sponsor principal (Grande) -->
    <div class="sponsor sponsor-grande">
      <a href="https://www.facebook.com/share/1DaWCBJN82/" target="_blank">    <!-- PAGO LAS TRES ETAPAS -->
        <img src="SP.png" alt="Sponsor Principal">
      </a>
    </div>

    <!-- Nivel medio (2) -->
    <div class="fila">
      <div class="sponsor sponsor-mediano">
        <a href="https://www.linktec.mx/" target="_blank">  
          <img src="linktec.jpg" alt="Sponsor 2">  <!-- PADRINO -->
        </a>
      </div>
      <div class="sponsor sponsor-mediano">
        <a href="https://www.facebook.com/constructora.flash.2025/" target="_blank">     <!-- PAGO SOLO MEDIANO ETAPA 3 -->
          <img src="flash.png" alt="Sponsor 3">
        </a>
      </div>
    </div>

    <!-- Nivel inferior (3) -->
    <div class="fila">
      <div class="sponsor sponsor-pequeno">
        <img src="uniformes.jpeg" alt="Sponsor 4">    <!-- PAGO TODAS LAS ETAPAS -->
      </div>
      <div class="sponsor sponsor-pequeno">
        <a href="https://es-la.facebook.com/people/FERRETERA-EL-CONSTRUCTOR/100066813121006/#" target="_blank">     <!-- PAGO SOLO ETAPA 2 PEQUEÑO -->
          <img src="constructor.png" alt="Sponsor 5">
        </a>
      </div>
      <div class="sponsor sponsor-pequeno">  
        <img src="prestigios.png" alt="Sponsor 6"> <!-- PRESTIGIOS -->
      </div>
      <div class="sponsor sponsor-pequeno">
        <img src="todo.png" alt="Sponsor 7">        <!-- PAGO TODAS LAS ETAPAS -->
      </div>
    </div>

  </div>
  </section>

  <img src="banner2.jpg" alt="Banner inferior" class="banner espaciado-banner2">
  <div class="footer">
  A LINK production powered by JGM
  </div>
</body>
</html>

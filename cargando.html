<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviando voto...</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<style>
body{
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
    min-height: 100vh;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(135deg,
                #1a001f,
                #3a0057,
                #7a00a8,
                #ff2da3,
                #7a00a8,
                #3a0057);
    background-size: 300% 300%;
    animation: fondoElegante 18s ease infinite;
}

@keyframes fondoElegante {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  pointer-events: none;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 3px 3px;
  animation: partículas 60s linear infinite;
  z-index: 0;
}

@keyframes partículas {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 2px,
    transparent 2px,
    transparent 40px
  );
  z-index: 0;
}
    
/* ===== BANNERS ===== */
.banner-top img,
.banner-bottom img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== CONTENIDO CENTRAL ===== */
.contenido{
    padding:60px 20px;
}

.loader{
    border:6px solid #f3f3f3;
    border-top:6px solid #FFD700;
    border-radius:50%;
    width:70px;
    height:70px;
    animation:spin 1s linear infinite;
    margin:0 auto 25px auto;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

h2{
    margin:0;
    font-size:22px;
}

strong{
    color:black;
    font-weight:800;
}

p{
    color:white;
    margin-top:10px;
}

/* ===== BARRA ===== */
.progress-container{
    width:80%;
    max-width:400px;
    background:#eee;
    border-radius:20px;
    margin:30px auto;
    overflow:hidden;
}

.progress-bar{
    height:12px;
    width:0%;
    background:#FFD700;
    transition:width 0.3s ease;
}

/* ===== SPONSOR ===== */
.sponsor{
    margin-top:50px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    padding:20px;
    border-radius:12px;
}

.sponsor img{
    max-width:200px;
    margin-top:10px;
}

.success{
    display:none;
    background:white;
    color:green;
    padding:15px 25px;
    border-radius:12px;
    font-weight:bold;
    margin:25px auto;
    font-size:18px;
    width:fit-content;
    box-shadow:0 0 20px rgba(255,255,255,0.4);
}

</style>
</head>

<body>

<div class="banner-top">
    <img src="banner.jpg" alt="Banner superior">
</div>

<div class="contenido">

    <div class="loader"></div>

    <h2>Enviando voto...</h2>
    <p>Por favor espera unos segundos</p>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="success" id="successMessage">
        ✔️ Voto recibido correctamente
    </div>

    <div class="sponsor">
        <strong>Patrocinador Oficial</strong>
        <br>
        <img src="sponsor.jpg" alt="Sponsor">
    </div>

</div>

<div class="banner-bottom">
    <img src="banner2.jpg" alt="Banner inferior">
</div>

<script>

// ===============================
// 1️⃣ VALIDAR SI SISTEMA CERRADO
// ===============================

fetch("config.json")
.then(res => res.json())
.then(config => {

    if(!config.votacion_abierta){
        window.location.href = "cerrado.html";
        return;
    }

    iniciarCarga();

})
.catch(() => {
    // si falla el json, permitir continuar
    iniciarCarga();
});


// ===============================
// 2️⃣ ANIMACIÓN + REDIRECCIÓN
// ===============================

function iniciarCarga(){

    let progress = 0;
    let bar = document.getElementById("progressBar");
    let success = document.getElementById("successMessage");

    let interval = setInterval(function(){
        progress += 5;
        bar.style.width = progress + "%";

        if(progress >= 100){
            clearInterval(interval);

            document.querySelector(".loader").style.display = "none";
            success.style.display = "block";

            setTimeout(function(){
                window.location.href = "gracias.html";
            }, 1200);
        }
    }, 120);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Votación Reina Valle 2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

  <script>
    // Control de acceso: primero ver si la votación está cerrada
    fetch('estado.json')
      .then(response => response.json())
      .then(data => {
        if (!data.votacion_abierta) {
          window.location.href = 'cerrado.html';
        } else if (document.cookie.includes('votado=true')) {
          window.location.href = 'gracias.html';
        }
      })
      .catch(error => {
        console.error('Error al cargar el estado de la votación:', error);
      });
  </script>
</head>

<body>
  <header>
    <img src="banner.jpg" alt="Banner Reina 2026" class="banner">
    <h1>Vota por tu candidata favorita</h1>
  </header>

  <form id="votingForm">
    <div class="candidates">
      <label>
        <input type="radio" name="candidata" value="Nombre1 Apellido1 Apellido2">
        <img src="participante1.jpg" alt="Participante 1">
        <span class="nombre">Participante 1</span>
         
      </label>
      <label>
        <input type="radio" name="candidata" value="Nombre2 Apellido1 Apellido2"> 
        <img src="participante2.jpg" alt="Participante 2">
        <span class="nombre">Participante 2</span>
      </label>
      <label>
        <input type="radio" name="candidata" value="Nombre3 Apellido1 Apellido2">
        <img src="participante3.jpg" alt="Participante 3">
        <span class="nombre">Participante 3</span>
      </label>
      <label>
        <input type="radio" name="candidata" value="Nombre4 Apellido1 Apellido2"> 
        <img src="participante4.jpg" alt="Participante 4">
        <span class="nombre">Participante 4</span>
      </label>
      <label>
        <input type="radio" name="candidata" value="Nombre5 Apellido1 Apellido2">
        <img src="participante5.jpg" alt="Participante 5">
        <span class="nombre">Participante 5</span>        
      </label>
    </div>
    <button type="submit">Enviar voto</button>
  </form>

  <section class="sponsors-section">

  <h2 class="titulo-sponsors">Patrocinadores Oficiales</h2>

  <div class="piramide-sponsors">

    <!-- GRANDE -->
    <div class="fila fila-grande">
      <div class="sponsor sponsor-grande">
        <img src="sponsor1.jpg">
      </div>
    </div>

    <!-- 2 MEDIANOS -->
    <div class="fila fila-mediana">
      <div class="sponsor sponsor-mediano"><img src="sponsor2.jpg"></div>
      <div class="sponsor sponsor-mediano"><img src="sponsor3.jpg"></div>
    </div>

    <!-- 4 MEDIANOS -->
    <div class="fila fila-mediana">
      <div class="sponsor sponsor-mediano"><img src="sponsor4.jpg"></div>
      <div class="sponsor sponsor-mediano"><img src="sponsor5.jpg"></div>
      <div class="sponsor sponsor-mediano"><img src="sponsor6.jpg"></div>
      <div class="sponsor sponsor-mediano"><img src="sponsor2.jpg"></div>
    </div>

    <!-- 5 PEQUEÑOS -->
    <div class="fila fila-pequena">
      <div class="sponsor sponsor-pequeno"><img src="sponsor3.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor4.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor5.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor6.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor2.jpg"></div>
    </div>

    <!-- 5 PEQUEÑOS -->
    <div class="fila fila-pequena">
      <div class="sponsor sponsor-pequeno"><img src="sponsor3.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor4.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor5.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor6.jpg"></div>
      <div class="sponsor sponsor-pequeno"><img src="sponsor2.jpg"></div>
    </div>

  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
